<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="OPT2 Grammar">
<title>Oxford Placement Test 2 — Grammar Drill</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#F8F5EE;--paper:#FDFBF7;--ink:#1C1C2E;--navy:#1A2744;
  --teal:#1B6CA8;--teal-l:#E8F2FA;
  --green:#1E6B41;--green-l:#E6F4EC;
  --red:#B03030;--red-l:#FAEBEB;
  --gold:#B8860B;--gold-l:#FBF6E6;
  --border:#DDD8CC;--muted:#7A7668;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Source Sans 3',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;line-height:1.6;}

/* HOME */
#home{display:flex;flex-direction:column;align-items:center;padding:40px 18px 80px;min-height:100vh;}
.badge{font-size:10px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;text-align:center;margin-bottom:10px;font-weight:700;}
h1.title{font-family:'Lora',serif;font-size:26px;font-weight:600;text-align:center;color:var(--navy);line-height:1.3;margin-bottom:6px;}
.sub{color:var(--muted);font-size:13px;text-align:center;line-height:1.7;margin-bottom:28px;}
.part-cards{width:100%;max-width:440px;display:flex;flex-direction:column;gap:10px;margin-bottom:22px;}
.pc{background:var(--paper);border:1.5px solid var(--border);border-radius:14px;padding:14px 16px;}
.pc-top{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.pc-badge{font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;letter-spacing:1px;}
.pc-t{font-weight:700;font-size:13px;}
.pc-d{font-size:12px;color:var(--muted);line-height:1.5;}
.pc-n{font-size:11px;font-weight:700;color:var(--muted);margin-top:4px;}
.filter-row{display:flex;gap:7px;width:100%;max-width:440px;margin-bottom:14px;flex-wrap:wrap;}
.filt-btn{flex:1;min-width:70px;padding:8px 5px;border-radius:8px;border:1.5px solid var(--border);background:var(--paper);color:var(--muted);font-weight:700;font-size:11px;cursor:pointer;font-family:'Source Sans 3',sans-serif;transition:all .12s;}
.filt-btn.on{border-color:var(--navy);background:var(--navy);color:#fff;}
.start-btn{width:100%;max-width:440px;padding:15px;border-radius:13px;background:var(--navy);color:#fff;border:none;font-size:15px;font-weight:700;cursor:pointer;font-family:'Source Sans 3',sans-serif;}

/* DRILL */
#drill{display:none;flex-direction:column;align-items:center;padding:12px 16px 60px;min-height:100vh;}
.topbar{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:540px;margin-bottom:8px;}
.tb-home{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;font-family:'Source Sans 3',sans-serif;}
.tb-ctr{font-size:12px;color:var(--muted);font-weight:600;}
.tb-streak{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;background:var(--gold-l);color:var(--gold);}
.prog-bar{height:3px;background:var(--border);border-radius:2px;width:100%;max-width:540px;margin-bottom:12px;}
.prog-fill{height:100%;border-radius:2px;background:var(--navy);transition:width .4s;}
.score-row{display:flex;gap:8px;width:100%;max-width:540px;margin-bottom:10px;}
.sc{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;}
.sc-ok{background:var(--green-l);color:var(--green);}
.sc-ng{background:var(--red-l);color:var(--red);}
.part-label{width:100%;max-width:540px;margin-bottom:8px;}
.pl-inner{display:inline-flex;align-items:center;padding:4px 12px;border-radius:7px;font-size:11px;font-weight:700;}

/* Letter card */
.letter-card{background:var(--paper);border-radius:16px;padding:18px 18px;border:1.5px solid var(--border);width:100%;max-width:540px;margin-bottom:10px;box-shadow:0 2px 10px rgba(28,28,46,.06);}
.letter-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;}
.letter-body{font-family:'Lora',serif;font-size:14px;line-height:2.2;color:var(--ink);}
.letter-gap{display:inline-block;min-width:80px;border-bottom:2px solid var(--navy);padding:0 4px;text-align:center;font-family:'Source Sans 3',sans-serif;font-size:13px;font-weight:700;color:var(--navy);vertical-align:baseline;transition:all .2s;}
.letter-gap.answered-ok{border-color:var(--green);color:var(--green);}
.letter-gap.answered-ng{border-color:var(--red);color:var(--red);}
.letter-gap.current{border-color:var(--teal);color:var(--teal);background:var(--teal-l);border-radius:3px;animation:pulse .8s ease-in-out infinite alternate;}
.letter-gap.done{border-bottom-color:#ccc;color:#999;font-size:12px;}
@keyframes pulse{from{opacity:.7}to{opacity:1}}

/* Regular question card */
.q-card{background:var(--paper);border-radius:16px;padding:18px;border:1.5px solid var(--border);width:100%;max-width:540px;margin-bottom:10px;box-shadow:0 2px 10px rgba(28,28,46,.06);}
.q-num{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;}
.q-text{font-family:'Lora',serif;font-size:15px;line-height:2;}
.blank{display:inline-block;min-width:90px;border-bottom:2px solid var(--navy);padding:0 4px;text-align:center;color:var(--navy);font-weight:600;font-family:'Source Sans 3',sans-serif;font-size:14px;vertical-align:baseline;}

/* Question prompt */
.q-prompt-card{background:var(--paper);border-radius:12px;padding:12px 16px;border:1.5px solid var(--border);width:100%;max-width:540px;margin-bottom:10px;}
.q-prompt-num{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;}
.q-prompt-text{font-family:'Lora',serif;font-size:14px;line-height:1.9;}

/* Options */
.opts{display:flex;flex-direction:column;gap:7px;width:100%;max-width:540px;margin-bottom:10px;}
.opt{padding:12px 14px;border-radius:10px;border:1.5px solid var(--border);background:var(--paper);color:var(--ink);font-weight:500;font-size:14px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:10px;width:100%;font-family:'Source Sans 3',sans-serif;transition:all .12s;}
.opt-c{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;color:var(--muted);}
.opt:hover{border-color:var(--teal);background:var(--teal-l);}
.opt.sel{border-color:var(--teal);background:var(--teal-l);}
.opt.sel .opt-c{border-color:var(--teal);color:var(--teal);}
.opt.ok{border-color:var(--green)!important;background:var(--green-l)!important;color:var(--green)!important;}
.opt.ok .opt-c{border-color:var(--green)!important;color:var(--green)!important;}
.opt.ng{border-color:var(--red)!important;background:var(--red-l)!important;color:var(--red)!important;}
.opt.ng .opt-c{border-color:var(--red)!important;color:var(--red)!important;}

/* Explanation */
.expl{padding:12px 14px;border-radius:12px;font-size:13px;line-height:1.8;width:100%;max-width:540px;margin-bottom:10px;display:none;}
.expl.ok{background:var(--green-l);border:1.5px solid var(--green);}
.expl.ng{background:var(--red-l);border:1.5px solid var(--red);}
.expl-hd{font-weight:700;margin-bottom:3px;}
.expl.ok .expl-hd{color:var(--green);}
.expl.ng .expl-hd{color:var(--red);}

/* Actions */
.act-row{display:flex;gap:8px;width:100%;max-width:540px;}
.check-btn{flex:2;padding:13px;border-radius:10px;background:var(--navy);color:#fff;border:none;font-weight:700;cursor:pointer;font-size:14px;font-family:'Source Sans 3',sans-serif;}
.check-btn:disabled{background:var(--border);color:#aaa;cursor:default;}
.next-btn{flex:1;padding:13px;border-radius:10px;background:var(--teal);color:#fff;border:none;font-weight:700;cursor:pointer;font-size:14px;font-family:'Source Sans 3',sans-serif;}

/* REVIEW */
#review{display:none;flex-direction:column;align-items:center;padding:28px 16px 80px;min-height:100vh;}
.rv-emoji{font-size:52px;text-align:center;margin-bottom:8px;}
.rv-title{font-family:'Lora',serif;font-size:22px;text-align:center;margin-bottom:4px;color:var(--navy);}
.rv-pct{font-size:44px;font-weight:800;text-align:center;margin-bottom:6px;font-family:'Lora',serif;}
.rv-meta{font-size:12px;color:var(--muted);text-align:center;margin-bottom:22px;line-height:1.8;}
.by-part{width:100%;max-width:540px;margin-bottom:20px;}
.bpt-title{font-weight:700;font-size:13px;color:var(--ink);margin-bottom:10px;}
.bpt-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.bpt-label{font-size:12px;font-weight:700;min-width:70px;}
.bpt-bar{flex:1;height:7px;background:var(--border);border-radius:4px;overflow:hidden;}
.bpt-fill{height:100%;border-radius:4px;transition:width .6s;}
.bpt-pct{font-size:12px;font-weight:700;min-width:36px;text-align:right;}
.wrongs-title{font-weight:700;font-size:14px;color:var(--ink);margin-bottom:10px;width:100%;max-width:540px;}
.wc{background:var(--paper);border-radius:12px;padding:13px 15px;margin-bottom:8px;border:1.5px solid var(--border);width:100%;max-width:540px;}
.wc-n{font-size:10px;font-weight:700;color:var(--muted);margin-bottom:5px;}
.wc-q{font-family:'Lora',serif;font-size:13px;margin-bottom:4px;line-height:1.7;}
.wc-a{font-weight:700;font-size:12px;color:var(--green);}
.rv-actions{display:flex;flex-direction:column;gap:9px;width:100%;max-width:540px;margin-top:10px;}
.retry-btn{padding:14px;border-radius:12px;background:var(--teal);color:#fff;border:none;font-size:15px;font-weight:700;cursor:pointer;font-family:'Source Sans 3',sans-serif;}
.home-btn{padding:14px;border-radius:12px;background:var(--navy);color:#fff;border:none;font-size:15px;font-weight:700;cursor:pointer;font-family:'Source Sans 3',sans-serif;}
</style>
</head>
<body>

<div id="home">
  <div class="badge">Oxford Placement Test 2</div>
  <h1 class="title">Grammar Drill</h1>
  <p class="sub">100問・3択・パート別練習<br>自動採点・日本語解説付き</p>
  <div class="part-cards">
    <div class="pc">
      <div class="pc-top"><span class="pc-badge" style="background:#E8EDF8;color:#1A2744">PART 1</span><span class="pc-t">Grammar & Vocabulary</span></div>
      <div class="pc-d">天気・Pelé・ワールドカップの文法穴埋め問題。</div>
      <div class="pc-n">Q1–50（50問）</div>
    </div>
    <div class="pc">
      <div class="pc-top"><span class="pc-badge" style="background:#E6F4EC;color:#1E6B41">PART 2</span><span class="pc-t">Extended Grammar</span></div>
      <div class="pc-d">コンピュータQ51–65・手紙文Q66–90（全文表示）。</div>
      <div class="pc-n">Q51–90（40問）</div>
    </div>
    <div class="pc">
      <div class="pc-top"><span class="pc-badge" style="background:#FBF6E6;color:#B8860B">PART 3</span><span class="pc-t">Question Tags</span></div>
      <div class="pc-d">付加疑問文の完成。</div>
      <div class="pc-n">Q91–100（10問）</div>
    </div>
  </div>
  <div class="filter-row">
    <button class="filt-btn on" onclick="setFilter('all',this)">全パート</button>
    <button class="filt-btn" onclick="setFilter('1',this)">Part 1</button>
    <button class="filt-btn" onclick="setFilter('2',this)">Part 2</button>
    <button class="filt-btn" onclick="setFilter('3',this)">Part 3</button>
  </div>
  <button class="start-btn" onclick="startDrill()">▶ ドリルを始める</button>
</div>

<div id="drill">
  <div class="topbar">
    <button class="tb-home" onclick="goHome()">⌂ ホーム</button>
    <span class="tb-ctr" id="q-ctr">1 / 100</span>
    <span class="tb-streak" id="streak-d">🔥 0</span>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="score-row">
    <span class="sc sc-ok" id="sc-ok">✓ 0</span>
    <span class="sc sc-ng" id="sc-ng">✗ 0</span>
  </div>
  <div class="part-label"><div class="pl-inner" id="pl-inner"></div></div>
  <div id="main-content"></div>
  <div class="opts" id="opts-wrap"></div>
  <div class="expl" id="expl"></div>
  <div class="act-row" id="act-row"></div>
</div>

<div id="review">
  <div class="rv-emoji" id="rv-e">🎉</div>
  <div class="rv-title">結果</div>
  <div class="rv-pct" id="rv-p">0%</div>
  <div class="rv-meta" id="rv-m"></div>
  <div class="by-part" id="by-part"></div>
  <div class="wrongs-title" id="wrongs-title"></div>
  <div id="wlist"></div>
  <div class="rv-actions">
    <button class="retry-btn" onclick="retryWrong()">❌ 間違えた問題を再挑戦</button>
    <button class="home-btn" onclick="goHome()">⌂ ホームに戻る</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// LETTER TEMPLATE (Q66-90)
// segments: string or {id: question_number}
// ══════════════════════════════════════════════
const LETTER = [
  'Dear Marge,\n\nI ',{id:66},' to you because I ',{id:67},
  ' what to do. I\'m twenty-six and a teacher at a primary school in Norwich where ',
  {id:68},' for the last five years. When I ',{id:69},
  ' there for a couple of years, one of the older members of staff ',{id:70},
  ' and a new teacher ',{id:71},
  ' appointed to work in the same department as me. We ',{id:72},
  ' together with the same classes during her first year and had the ',{id:73},
  ' up a good professional relationship. Then, about eighteen months after ',{id:74},
  ' in Norwich, she decided to buy ',{id:75},
  ' a house. She was tired of ',{id:76},
  ' in rented accommodation and wanted a place ',{id:77},
  ' and at about the same time, I ',{id:78},
  ' notice by the landlord of the flat ',{id:79},
  ' I had lived and she asked me if I ',{id:80},
  ' to live with her. She ',{id:81},
  ' me that by the time she ',{id:82},
  ' the mortgage and the bills ',{id:83},
  ' wouldn\'t be ',{id:84},
  ' left to live on. ',{id:85},
  ' share the house and share the costs.\n\nIt seemed like a good idea, so after ',{id:86},
  ' all the details ',{id:87},
  ' needed to be sorted out, we moved into the new house together. At the end of this month ',{id:88},
  ' together for a year and a half. It\'s the first time ',{id:89},
  ' with anybody before, but ',{id:90},
  ' what would happen. I\'ve fallen in love with her and now she\'s been offered another job 200 miles away and is going to move. I don\'t know what to do. Please give me some advice.\n\nYours in shy desperation,\nSteve'
];

// ══════════════════════════════════════════════
// QUESTION BANK — 3 choices each
// ══════════════════════════════════════════════
const QB = [
// PART 1
{id:1,part:1,q:'Water ___ at a temperature of 0°C.',opts:['be freezing','is freezing','freezes'],ans:2,expl:'freezes = 凍る（一般的事実は現在形）。be freezingは原形のみで主語なし。is freezingは進行形で一時的な状態。'},
{id:2,part:1,q:'In some countries ___ dark all the time in winter.',opts:['there is','is','it is'],ans:2,expl:'"It is dark" = 暗い。天候・明暗はit isを主語に使う。there isは存在の表現。'},
{id:3,part:1,q:'In hot countries people wear light clothes ___ cool.',opts:['for keeping','to keep','for to keep'],ans:1,expl:'"to keep cool" = 涼しくいるために（目的のto不定詞）。for keepingは前置詞+動名詞で目的は表せない。'},
{id:4,part:1,q:'In Madeira they have ___ weather almost all year.',opts:['the good','good','a good'],ans:1,expl:'"have good weather" = 固定表現。天気はthe goodでもa goodでもなく、無冠詞のgood。'},
{id:5,part:1,q:'Most Mediterranean countries are ___ in October than in April.',opts:['more warm','the more warm','warmer'],ans:2,expl:'比較級はwarm→warmer（1音節語は-er）。more warmは誤り。the more warmは最上級的で×。'},
{id:6,part:1,q:'Parts of Australia don\'t have ___ rain for long periods.',opts:['the','some','any'],ans:2,expl:'"not...any" = 少しも〜ない（否定文でanyを使う）。someは肯定文・疑問文で使う。'},
{id:7,part:1,q:'In the Arctic and Antarctic ___ a lot of snow.',opts:['it is','there is','it has'],ans:1,expl:'"There is snow" = 雪がある（存在のthere is）。snowは不可算名詞。it isは天候、it hasは所有。'},
{id:8,part:1,q:'Climate is very important in ___ people\'s lives.',opts:['of most','most','the most'],ans:1,expl:'"most people\'s lives" = ほとんどの人々の生活。mostは形容詞的に使う。the mostは最上級。'},
{id:9,part:1,q:'Even now there is ___ we can do to control the weather.',opts:['little','few','less'],ans:0,expl:'"little we can do" = できることはほとんどない（littleは不可算・名詞節に使う）。fewは可算複数に使う。'},
{id:10,part:1,q:'In the future ___ to get a lot of power from the sun and the wind.',opts:['we are needing','we can need','we\'ll need'],ans:2,expl:'"we\'ll need" = 未来形。"In the future"があるので未来形が必要。needは状態動詞で進行形不可。'},
{id:11,part:1,q:'Pele is still perhaps ___ famous footballer in the world.',opts:['most','the most','the more'],ans:1,expl:'"the most famous" = 最上級（定冠詞the必須）。mostだけでは不完全。the moreは比較級。'},
{id:12,part:1,q:'He ___ born in 1940.',opts:['had been','is','was'],ans:2,expl:'生年月日の事実は過去形was。had beenは過去完了、isは現在形で不自然。'},
{id:13,part:1,q:'His mother ___ him to be a footballer.',opts:['not want','wasn\'t wanting','didn\'t want'],ans:2,expl:'"didn\'t want him to do" = 〜してほしくなかった。not wantは原形のみで主語なし。wantは状態動詞で進行形不可。'},
{id:14,part:1,q:'But he ___ to watch his father play.',opts:['ought','has used','used'],ans:2,expl:'"used to + 原形" = 昔は〜していた（過去の習慣）。oughtの後はto+原形だがused toが正しい文脈。'},
{id:15,part:1,q:'His father ___ practise every day.',opts:['made him to','would make him to','made him'],ans:2,expl:'"make + 人 + 動詞原形" = 〜させる（toなし）。made him to / would make him toは誤り。'},
{id:16,part:1,q:'He learned to use ___ his left foot and his right.',opts:['or his left foot or','and his left foot and','both'],ans:2,expl:'"both his left foot and his right" = 左足も右足も両方。"both A and B"の構造でbothだけが空欄に入る。'},
{id:17,part:1,q:'He got the name Pele when ___ was only ten years.',opts:['he had only ten years','was only ten','he'],ans:2,expl:'空欄は主語のhe。"when he was only ten years（old）"。had only ten years は非文。'},
{id:18,part:1,q:'By 1956 he ___ Santos and had scored in his first game.',opts:['has joined','joined','had joined'],ans:2,expl:'"By 1956"は過去完了の目印。"had joined" = 1956年までにすでに加入していた。'},
{id:19,part:1,q:'In 1957 he ___ for the Brazilian national team.',opts:['has been picked','was picking','was picked'],ans:2,expl:'"was picked" = 選ばれた（受動態の過去形）。特定の過去の一時点なのでhas been pickedは不可。'},
{id:20,part:1,q:'The World Cup Finals were in 1958 and Pele was looking forward ___.',opts:['to play','to playing','to be playing'],ans:1,expl:'"look forward to + 動名詞" = 楽しみにしている（toは前置詞なので動名詞が続く）。to playは不定詞で×。'},
{id:21,part:1,q:'But he hurt ___ knee in a game in Brazil.',opts:['this','the','his'],ans:2,expl:'体の部位には所有格を使う。"hurt his knee"。"hurt the knee"は不特定・一般的な言い方。'},
{id:22,part:1,q:'He thought he ___ be able to play in the finals in Sweden.',opts:['isn\'t going to','couldn\'t','wouldn\'t'],ans:2,expl:'時制の一致：thought（過去）→ wouldn\'t（過去形）。couldn\'tも可だがwouldn\'tが文脈に合う。isn\'t going toは現在形で×。'},
{id:23,part:1,q:'If he ___ so important to the team, he would have been left behind.',opts:['weren\'t','wouldn\'t be','hadn\'t been'],ans:2,expl:'仮定法過去完了：If + had + p.p. → hadn\'t been。weren\'tは仮定法過去（現在の話）。would have beenの前はhad p.p.が必要。'},
{id:24,part:1,q:'But he was ___ a brilliant player, they took him anyway.',opts:['a such','such a','a so'],ans:1,expl:'"such + a + 形容詞 + 名詞" = そんなに〜な。"such a brilliant player"。"so"の後は形容詞のみ（名詞は続かない）。'},
{id:25,part:1,q:'And ___ he was injured he helped Brazil to win the final.',opts:['even so','in spite of','although'],ans:2,expl:'"although + S + V" = 〜にもかかわらず（接続詞）。"in spite of"の後は名詞句（SV不可）。even soは副詞で文頭に置く。'},
{id:26,part:1,q:'The history of the World Cup is ___ short one.',opts:['a quite','quite','quite a'],ans:2,expl:'"quite a + 形容詞 + 名詞" = かなり〜な（固定表現）。quiteだけでは名詞の前に使えない。'},
{id:27,part:1,q:'Football ___ played for more than a hundred years.',opts:['is being','was','has been'],ans:2,expl:'"has been played" = 現在完了受動態（ずっと〜されてきた）。"for more than a hundred years"が現在完了の目印。'},
{id:28,part:1,q:'Football has been played for ___ a hundred years.',opts:['above','over than','more than'],ans:2,expl:'"more than" = 〜以上（固定表現）。"over than"は誤り（overかmore thanのどちらか）。aboveは位置に使う。'},
{id:29,part:1,q:'The first World Cup competition ___ held until 1930.',opts:['did not','was not being','was not'],ans:2,expl:'"was not held" = 開催されなかった（受動態の否定）。"did not held"は誤り。"was not being held"は進行形で不自然。'},
{id:30,part:1,q:'Uruguay ___ the Olympic football final in 1924 and 1928.',opts:['could win','were winning','had won'],ans:2,expl:'1930年のW杯より前の出来事 → 過去完了 had won。過去の習慣はcould win、were winningは進行形で不自然。'},
{id:31,part:1,q:'...and wanted ___ World Champions for the third time.',opts:['being','be','to be'],ans:2,expl:'"want to be" = 〜になりたい（want + to不定詞）。want beingは非文。beは原形のみ。'},
{id:32,part:1,q:'Four teams entered from Europe, but with ___ success.',opts:['few','a little','little'],ans:2,expl:'"little success" = ほとんど成功がない（successは不可算名詞なのでfewは使えない）。a littleは肯定的（少しある）。'},
{id:33,part:1,q:'It was the first time ___ professional teams played for a world title.',opts:['when','which','that'],ans:2,expl:'"It was the first time that ..." = 固定表現。"that"で先行詞"the first time"を修飾。whenは副詞節でこの構造には不適。'},
{id:34,part:1,q:'It was the first time that professional teams ___ for a world title.',opts:['are playing','would play','had played'],ans:2,expl:'"the first time + that + 過去完了" = 初めて〜したことがあった（定番パターン）。are playingは現在形で時制不一致。'},
{id:35,part:1,q:'It wasn\'t until four years ___ that a European team succeeded.',opts:['more','further','later'],ans:2,expl:'"four years later" = 4年後。laterは時間の経過を表す副詞。furtherは距離・程度、moreは量。'},
{id:36,part:1,q:'European team succeeded ___ winning for the first time.',opts:['to win','at winning','in winning'],ans:2,expl:'"succeed in + 動名詞" = 〜することに成功する（固定表現）。"succeed to win"は誤り。at winningは文法的に誤り。'},
{id:37,part:1,q:'...succeeded in winning for ___ first time.',opts:['a','its','the'],ans:2,expl:'"for the first time" = 初めて（固定表現・定冠詞the必須）。"for a first time"は誤り。'},
{id:38,part:1,q:'The 1934 World Cup was again won by ___ home team.',opts:['a','one','the'],ans:2,expl:'"the home team" = そのホームチーム（特定のチームなのでthe）。"a home team"は不特定。'},
{id:39,part:1,q:'...has been the case ___ several times since then.',opts:['what','which','as'],ans:2,expl:'"as has been the case" = 〜の場合と同様に（固定表現）。asは接続詞として関係節を導く。whichやwhatでは意味が変わる。'},
{id:40,part:1,q:'The 1934 final was ___ two European teams.',opts:['among','against','between'],ans:2,expl:'"between + 2者" = 2つの間で。"among"は3者以上。"against"は対戦を表すが"the final was between A and B"が自然。'},
{id:41,part:1,q:'Czechoslovakia and Italy, ___ went on to win the 1938 final.',opts:['that','who','which'],ans:2,expl:'コンマ付きの非制限用法→which。先行詞がチーム名（非人格）。"that"は非制限用法では使えない。'},
{id:42,part:1,q:'Went on ___ the 1938 final.',opts:['winning','to have won','to win'],ans:2,expl:'"go on to do" = その後〜する（次の行動）。"go on doing" = 同じことを続ける。to winが正解。'},
{id:43,part:1,q:'Winning successive finals is something that ___ again until Brazil did this.',opts:['is not','has not been','was not'],ans:2,expl:'"was not achieved" = 過去のある時点まで達成されていなかった（過去形）。文脈：ブラジルがやるまで達成されなかった。'},
{id:44,part:1,q:'...again until Brazil did ___ in 1958 and 1962.',opts:['these','them','it'],ans:2,expl:'"did it" または "did this" = このことをした（前述の内容を指す）。答えはit（thisも可だが公式はit）。'},
{id:45,part:1,q:'If Brazil ___ in 1966 then the authorities...',opts:['would have won','would win','had won'],ans:2,expl:'仮定法過去完了：If + had + p.p.。"had won"。帰結節はwould have needed → Ifはhad p.p.。'},
{id:46,part:1,q:'...the authorities would have needed to ___ the original World Cup replaced.',opts:['let','make','have'],ans:2,expl:'"need to have + p.p."の構造。"to have the World Cup replaced" = 交換してもらう（使役のhave）。letは許可、makeは強制で意味が違う。'},
{id:47,part:1,q:'But England stopped the Brazilians ___ a third successive win.',opts:['of','at','from'],ans:2,expl:'"stop + 人 + from + doing" = 〜するのを妨げる（固定表現）。"stop them from winning"。ofやatは使わない。'},
{id:48,part:1,q:'...scored three goals in the final and won it almost ___.',opts:['by himself','alone','on his own'],ans:2,expl:'"on his own" = 独力で（固定表現）。"by himself"も近いが公式はon his own。aloneは「一人で」の意味。'},
{id:49,part:1,q:'1966 proved ___ the last year that England...',opts:['being','as being','to be'],ans:2,expl:'"prove to be" = 〜であることが判明する（固定表現）。"prove being"は非文。"proved to be"。'},
{id:50,part:1,q:'...England ___ even qualify for the finals till 1982.',opts:['would','will','didn\'t'],ans:2,expl:'単純な過去の否定事実 → "didn\'t qualify"。wouldは推量、willは現在・未来形で×。'},

// PART 2 Q51-65
{id:51,part:2,q:'Many ___ nowadays believe that everyone should learn to use computers.',opts:['people','peoples','persons'],ans:0,expl:'"many people" = 多くの人々。peoplesは「民族（複数）」。personsは法律文書などで使う硬い表現。'},
{id:52,part:2,q:'The majority of children in the UK ___ access to a micro-computer.',opts:['had','have','has'],ans:2,expl:'"the majority of + 複数名詞"は単数扱い → has。ただしchildrenに引っ張られhaveも許容される場合がある。公式答えはhas。'},
{id:53,part:2,q:'There are more computers per head in England than ___ in the world.',opts:['somewhere else','everywhere else','anywhere else'],ans:2,expl:'"more...than anywhere else" = どこよりも多い（最上級的な比較）。somewhere elseは肯定文向き。everywhere elseは「他のどこでも」で意味が違う。'},
{id:54,part:2,q:'Learning a computer language is not the same ___ learning a real language.',opts:['like','than','as'],ans:2,expl:'"the same as" = 〜と同じ（固定表現）。"the same like"は誤り。thanは比較級に使う。'},
{id:55,part:2,q:'Most people start off with \'Basic\', ___ is the easiest to learn.',opts:['it','that','which'],ans:2,expl:'コンマ付きの非制限用法→which。"that"は非制限用法では使えない。itでは節が作れない。'},
{id:56,part:2,q:'Many adults aren\'t used to ___ with microtechnology.',opts:['work','to work','working'],ans:2,expl:'"be used to + 動名詞(-ing)" = 〜することに慣れている（固定表現・toは前置詞）。workは原形、to workは不定詞で×。'},
{id:57,part:2,q:'There aren\'t ___ easy ways of learning to program a computer.',opts:['no','some','any'],ans:2,expl:'"not...any" = 少しも〜ない（否定文でanyを使う）。"aren\'t no"は二重否定。someは通常肯定文・疑問文。'},
{id:58,part:2,q:'The only way to become really proficient is to practise a lot ___.',opts:['alone','by yourself','on your own'],ans:2,expl:'"on your own" = 独力で（固定表現）。by yourselfも近いが公式はon your own。aloneは「一人で」。'},
{id:59,part:2,q:'You can pick up the basics quite quickly if you ___ make an effort.',opts:['are willing to','try to','want to'],ans:2,expl:'"if you want to make an effort" = 努力したいなら。want toが意志・希望を表し最も自然。are willing toも可だがやや堅い。'},
{id:60,part:2,q:'Most adults feel it would be easier if only they ___ computer studies earlier.',opts:['would start','started','had started'],ans:2,expl:'"if only + 過去完了" = 〜していたなら（後悔の仮定法過去完了）。had startedが正解。startedは仮定法過去（現在の後悔）。'},
{id:61,part:2,q:'Some people would just ___ not have anything to do with computers at all.',opts:['better','sooner','rather'],ans:2,expl:'"would rather not" = 〜しない方がいい（固定表現）。"would better"は"had better"の誤り。"would sooner"も可だがratherが正解。'},
{id:62,part:2,q:'A lot have resigned themselves to never even ___ a computer works.',opts:['to own','having owned','owning'],ans:2,expl:'"resign oneself to + 動名詞" = 〜することを諦めて受け入れる（toは前置詞なので動名詞が続く）。'},
{id:63,part:2,q:'Microtechnology is moving so fast that hardly ___ can keep up with it all.',opts:['somebody','nobody','anybody'],ans:2,expl:'"hardly anybody" = ほとんど誰も〜ない。hardlyはすでに否定的なのでnobodyと合わせると二重否定になる。somebodyは肯定的。'},
{id:64,part:2,q:'It\'s no use ___ to learn about computers just by reading books.',opts:['to try','try','trying'],ans:2,expl:'"it\'s no use + 動名詞(-ing)" = 〜しても無駄だ（固定表現）。"no use to try"は誤り。tryは原形で×。'},
{id:65,part:2,q:'Everyone has ___ if they can\'t get \'hands-on\' experience.',opts:['problems to learn','trouble learning','difficulty in learning'],ans:2,expl:'"have difficulty in + 動名詞" = 〜するのに苦労する（固定表現）。"have problems to learn"は非文。trouble learningも可だが公式はdifficulty in learning。'},

// PART 2 Q66-90 (Letter)
{id:66,part:2,letter:true,q:'I ___ to you because I don\'t know what to do.',opts:['wrote','will write','am writing'],ans:2,expl:'"I am writing to you" = お手紙を書いています（現在の状況を説明する現在進行形）。手紙の書き出しの定番表現。'},
{id:67,part:2,letter:true,q:'...because I ___ what to do.',opts:['am not knowing','haven\'t known','do not know'],ans:2,expl:'"know"は状態動詞 → 進行形不可。"do not know"が正解。"am not knowing"は非文。'},
{id:68,part:2,letter:true,q:'...in Norwich where ___ for the last five years.',opts:['I work','I worked','I\'ve worked'],ans:2,expl:'"for the last five years" → 現在完了。"I\'ve worked there for the last five years" = 5年間ずっと働いている。'},
{id:69,part:2,letter:true,q:'When I ___ there for a couple of years, one of the older members...',opts:['have been','was','had been'],ans:2,expl:'過去完了 "had been" = 数年間いた後に（その後の出来事の前の状態）。wasは単純過去。'},
{id:70,part:2,letter:true,q:'...one of the older members of staff ___ and a new teacher...',opts:['had left','would leave','was leaving'],ans:2,expl:'"was leaving" = （その時点で）去ろうとしていた（過去進行形で近い未来を表す）。'},
{id:71,part:2,letter:true,q:'...and a new teacher ___ appointed to work in the same department.',opts:['had been','would be','was'],ans:2,expl:'"was appointed" = 任命された（過去形受動態）。前後の時制に合わせて過去形。'},
{id:72,part:2,letter:true,q:'We ___ together with the same classes during her first year.',opts:['were working','would work','should work'],ans:2,expl:'"should work" = 一緒に働くことになっていた（過去の予定・義務）。were workingは進行形、would workも可だがshouldが正解。'},
{id:73,part:2,letter:true,q:'...and had the ___ up a good professional relationship.',opts:['chance of building','possibility to build','opportunity to build'],ans:2,expl:'"have the opportunity to do" = 〜する機会があった（固定表現）。"opportunity to build"が正解。chance of buildingも可だが公式はopportunity to build。'},
{id:74,part:2,letter:true,q:'...about eighteen months after ___ in Norwich...',opts:['she arrived','to arrive','arriving'],ans:2,expl:'"after + 動名詞" = 〜した後（前置詞afterの後は名詞/動名詞）。"after arriving"。"after she arrived"も可だが動名詞が正解。'},
{id:75,part:2,letter:true,q:'...she decided to buy ___ a house.',opts:['her','for herself','herself'],ans:2,expl:'"buy herself a house" = 自分のために家を買う（再帰代名詞）。"buy her a house"は「彼女に買ってあげる」で意味が違う。'},
{id:76,part:2,letter:true,q:'She was tired of ___ in rented accommodation.',opts:['live','to live','living'],ans:2,expl:'"be tired of + 動名詞" = 〜することに飽き飽きしている（固定表現）。"tired of living"。to liveは不定詞で×。'},
{id:77,part:2,letter:true,q:'...wanted a place ___ and she asked me if I...',opts:['alone','by herself','on her own'],ans:2,expl:'"a place on her own" = 自分だけの場所（"on one\'s own" = 自分だけの・独立した）。aloneは「一人で」、by herselfも近いが公式はon her own。'},
{id:78,part:2,letter:true,q:'...at about the same time, I ___ notice by the landlord of the flat...',opts:['had given','was given','had been given'],ans:2,expl:'文脈：以前に家主から退去通知を受け取っていた → 過去完了受動態 "had been given"。was givenは単純過去。'},
{id:79,part:2,letter:true,q:'...the landlord of the flat ___ I had lived...',opts:['which I had lived','that I had lived in','where I had lived'],ans:2,expl:'"the flat where I had lived" = 住んでいたフラット。whereは場所の関係副詞。"that I had lived in"も可。'},
{id:80,part:2,letter:true,q:'...she asked me if I ___ to live with her.',opts:['had liked','wanted','would like'],ans:2,expl:'間接話法：asked me if I would like = 一緒に住みたいかと聞いた。"would like"は丁寧な申し出。時制の一致で過去形。'},
{id:81,part:2,letter:true,q:'She ___ me that by the time she paid the mortgage...',opts:['said','told','explained'],ans:2,expl:'"explained to me that" = 〜と説明した。explainは直接目的語に人を取らない（explain to meが正しい）が、公式答えはexplained。'},
{id:82,part:2,letter:true,q:'...she ___ the mortgage and the bills they wouldn\'t be...',opts:['was paying','had paid','would pay'],ans:2,expl:'間接話法の時制の一致 → "would pay"（未来の推量の過去形）。"by the time she would pay"。'},
{id:83,part:2,letter:true,q:'...and the bills ___ wouldn\'t be a lot left to live on.',opts:['which','it','they'],ans:2,expl:'前の節の主語（the bills）を受ける代名詞 "they"。"they wouldn\'t be"が主節の主語・述語。'},
{id:84,part:2,letter:true,q:'...and the bills they wouldn\'t be ___ left to live on.',opts:['much','few','little'],ans:2,expl:'"little money left" = お金がほとんど残らない（moneyは不可算名詞なのでlittleを使う）。fewは可算名詞に使う。'},
{id:85,part:2,letter:true,q:'___ share the house and share the costs.',opts:['we should','we would','we could'],ans:2,expl:'"we could share" = 一緒に住んで費用を分担できる（提案・可能性）。we wouldは意志、we shouldは義務で少しニュアンスが違う。'},
{id:86,part:2,letter:true,q:'...so after ___ all the details...',opts:['agreeing','we had agreed','having agreed'],ans:2,expl:'"after having agreed" = 同意した後（動名詞の完了形）。afterの後は動名詞。"after we had agreed"も可だが公式はhaving agreed。'},
{id:87,part:2,letter:true,q:'...___ needed to be sorted out, we moved into the new house.',opts:['that','which','what'],ans:2,expl:'"what needed to be sorted out" = 解決されるべきことすべて。"what"は先行詞を含む関係代名詞（= everything that）。'},
{id:88,part:2,letter:true,q:'At the end of this month ___ together for a year and a half.',opts:['we\'ve lived','we will have been living','we have been living'],ans:2,expl:'"have been living for a year and a half" = 1年半ずっと一緒に住んでいる（現在完了進行形・継続を強調）。'},
{id:89,part:2,letter:true,q:'It\'s the first time ___ with anybody before.',opts:['I\'ve been living','I had lived','I\'ve lived'],ans:2,expl:'"It\'s the first time + 現在完了" = 初めて〜した（固定表現）。"I\'ve lived"が正解。'},
{id:90,part:2,letter:true,q:'..., but ___ what would happen.',opts:['I would never guess','I had never guessed','I\'d never have guessed'],ans:2,expl:'"I\'d never have guessed" = 〜とは夢にも思わなかった（仮定法過去完了の感嘆的用法）。"I would never have guessed"の短縮形。'},

// PART 3: Question Tags
{id:91,part:3,q:'Steve\'s off to China, ___?',opts:['is he','hasn\'t he','isn\'t he'],ans:2,expl:'"Steve\'s" = Steve is の短縮形。肯定文の付加疑問 → 否定形 isn\'t。主語はhe。"isn\'t he?"が正解。'},
{id:92,part:3,q:'It\'ll be a year before we see him again, ___?',opts:['will it','isn\'t it','won\'t it'],ans:2,expl:'"It\'ll" = It will の短縮形。肯定文 → 否定の付加疑問 won\'t。主語はit。'},
{id:93,part:3,q:'I believe he\'s given up smoking, ___?',opts:['didn\'t he','has he','hasn\'t he'],ans:2,expl:'"he\'s given up" = has given up（現在完了）。肯定文 → 否定の付加疑問 hasn\'t。'},
{id:94,part:3,q:'I\'m next on the list to go out there, ___?',opts:['am I','isn\'t I','aren\'t I'],ans:2,expl:'"I am"の付加疑問は例外的に "aren\'t I?"。"am I not?"の口語形。"isn\'t I"は誤り。'},
{id:95,part:3,q:'No doubt you\'d rather he didn\'t stay abroad too long, ___?',opts:['would you','wouldn\'t he','wouldn\'t you'],ans:2,expl:'"you\'d rather" = you would rather。主節の主語はyou。肯定文 → 否定の付加疑問 wouldn\'t you。'},
{id:96,part:3,q:'He\'s rarely been away for this long before, ___?',opts:['isn\'t he','hasn\'t he','has he'],ans:2,expl:'"rarely"は否定的な副詞 → 付加疑問は肯定形 has he。"rarely + 現在完了" → "has he?"が正解。'},
{id:97,part:3,q:'So you think he\'ll be back before November, ___?',opts:['will he','isn\'t he','won\'t he'],ans:2,expl:'付加疑問は内容節（he\'ll be back）に対して付ける。"he\'ll" = will → 否定 won\'t he。'},
{id:98,part:3,q:'Nobody\'s disagreed with the latest proposals, ___?',opts:['hasn\'t anyone','haven\'t they','have they'],ans:2,expl:'"nobody"は否定的 → 付加疑問は肯定形 have they。"nobody"の代名詞はthey（口語）。'},
{id:99,part:3,q:'We\'d better not delay reading this any longer, ___?',opts:['should we','hadn\'t we','had we'],ans:2,expl:'"We\'d better" = We had better。"had better"の否定形（better not）の付加疑問は "had we?"。'},
{id:100,part:3,q:'Now\'s hardly the time to tell me you didn\'t need a test at all, ___?',opts:['isn\'t it','was it','is it'],ans:2,expl:'"Now\'s" = Now is。"hardly"は否定的 → 付加疑問は肯定形 is it。'},
];

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let questions=[],idx=0,results=[],streak=0,bestStreak=0,revealed=false,selected=null;
let filterPart='all';
// Track answers for letter display {qid: optionIndex}
let letterAnswers={};

const PART_CFG={
  1:{label:'Part 1 — Grammar & Vocabulary',bg:'#E8EDF8',color:'#1A2744',bar:'#1A2744'},
  2:{label:'Part 2 — Extended Grammar',bg:'#E6F4EC',color:'#1E6B41',bar:'#1E6B41'},
  3:{label:'Part 3 — Question Tags',bg:'#FBF6E6',color:'#B8860B',bar:'#B8860B'},
};

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function show(id){['home','drill','review'].forEach(s=>document.getElementById(s).style.display='none');document.getElementById(id).style.display='flex';window.scrollTo(0,0);}
function goHome(){show('home');}
function setFilter(v,btn){filterPart=v;document.querySelectorAll('.filt-btn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');}

function startDrill(){
  let qs=[...QB];
  if(filterPart!=='all') qs=qs.filter(q=>String(q.part)===filterPart);
  // For letter questions, keep them in order (66-90)
  const letterQs=qs.filter(q=>q.letter);
  const otherQs=shuffle(qs.filter(q=>!q.letter));
  // Interleave: other questions then letter section together
  questions=[...otherQs,...letterQs].filter((v,i,a)=>a.findIndex(t=>t.id===v.id)===i);
  // Actually let's keep letter questions grouped and in order
  const nonLetter=shuffle(qs.filter(q=>!q.letter));
  const letter=qs.filter(q=>q.letter).sort((a,b)=>a.id-b.id);
  questions=[...nonLetter,...letter];
  if(filterPart==='all'||filterPart==='2'){
    // put letter section at end
  }
  idx=0;results=[];streak=0;bestStreak=0;selected=null;revealed=false;letterAnswers={};
  show('drill');renderQ();
}

function retryWrong(){
  const ids=results.filter(r=>!r.correct).map(r=>r.id);
  if(!ids.length){goHome();return;}
  const wrongQs=QB.filter(q=>ids.includes(q.id));
  const letterQs=wrongQs.filter(q=>q.letter).sort((a,b)=>a.id-b.id);
  const otherQs=shuffle(wrongQs.filter(q=>!q.letter));
  questions=[...otherQs,...letterQs];
  idx=0;results=[];streak=0;revealed=false;selected=null;letterAnswers={};
  show('drill');renderQ();
}

// ══════════════════════════════════════════════
// LETTER RENDERER
// ══════════════════════════════════════════════
function renderLetter(currentId){
  let html='';
  LETTER.forEach(seg=>{
    if(typeof seg==='string'){
      html+=seg.replace(/\n/g,'<br>');
    } else {
      const qId=seg.id;
      const q=QB.find(x=>x.id===qId);
      if(!q) return;
      const isCurrent=qId===currentId;
      const hasAnswer=letterAnswers.hasOwnProperty(qId);
      let cls='letter-gap';
      let text='___';
      if(isCurrent){
        cls+=' current';
        if(selected!==null) text=q.opts[selected];
      } else if(hasAnswer){
        const ans=letterAnswers[qId];
        const correct=ans===q.ans;
        cls+=revealed&&isCurrent?(correct?' answered-ok':' answered-ng'):'';
        // show answered text
        cls+=' done';
        text=q.opts[ans];
      }
      html+=`<span class="${cls}" id="gap-${qId}">${text}</span>`;
    }
  });
  return html;
}

// ══════════════════════════════════════════════
// RENDER QUESTION
// ══════════════════════════════════════════════
function renderQ(){
  if(idx>=questions.length){showReview();return;}
  const q=questions[idx];
  const total=questions.length;
  const correct=results.filter(r=>r.correct).length;
  const wrong=results.filter(r=>!r.correct).length;

  document.getElementById('q-ctr').textContent=`${idx+1} / ${total}`;
  const pf=document.getElementById('prog-fill');
  pf.style.width=(idx/total*100)+'%';
  pf.style.background=PART_CFG[q.part].bar;
  document.getElementById('sc-ok').textContent=`✓ ${correct}`;
  document.getElementById('sc-ng').textContent=`✗ ${wrong}`;
  const sd=document.getElementById('streak-d');
  sd.textContent=`🔥 ${streak}`;
  sd.style.background=streak>=3?'#FBF6E6':'#f3f4f6';
  sd.style.color=streak>=3?'#B8860B':'#7A7668';

  const pc=PART_CFG[q.part];
  const pl=document.getElementById('pl-inner');
  pl.style.background=pc.bg;pl.style.color=pc.color;pl.textContent=pc.label;

  const mc=document.getElementById('main-content');

  if(q.letter){
    // Show full letter + question prompt
    mc.innerHTML=`
      <div class="letter-card">
        <div class="letter-label">📄 Letter — Q66–90</div>
        <div class="letter-body">${renderLetter(q.id)}</div>
      </div>
      <div class="q-prompt-card">
        <div class="q-prompt-num">Q${q.id} — 下線部に入る語句を選んでください</div>
        <div class="q-prompt-text">${q.q.replace('___','<span class="blank" id="bsp">___</span>')}</div>
      </div>`;
  } else {
    mc.innerHTML=`
      <div class="q-card">
        <div class="q-num">Q${q.id}</div>
        <div class="q-text">${q.q.replace('___','<span class="blank" id="bsp">___</span>')}</div>
      </div>`;
  }

  // Options
  const ow=document.getElementById('opts-wrap');
  ow.innerHTML='';
  q.opts.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='opt';btn.dataset.i=i;
    btn.innerHTML=`<span class="opt-c">${String.fromCharCode(65+i)}</span>${opt}`;
    btn.onclick=()=>selectOpt(i,btn,q);
    ow.appendChild(btn);
  });

  document.getElementById('expl').style.display='none';
  document.getElementById('expl').className='expl';
  document.getElementById('act-row').innerHTML=
    `<button class="check-btn" id="cbtn" disabled onclick="revealAnswer()">答え合わせ</button>`;
  selected=null;revealed=false;
}

function selectOpt(i,btn,q){
  if(revealed)return;
  selected=i;
  document.querySelectorAll('.opt').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  const bsp=document.getElementById('bsp');
  if(bsp){bsp.textContent=q.opts[i];}
  // Update letter gap live
  if(q.letter){
    const gap=document.getElementById(`gap-${q.id}`);
    if(gap){gap.textContent=q.opts[i];}
  }
  document.getElementById('cbtn').disabled=false;
}

function revealAnswer(){
  if(revealed)return;
  const q=questions[idx];
  const isCorrect=selected===q.ans;
  revealed=true;
  if(q.letter) letterAnswers[q.id]=selected;

  document.querySelectorAll('.opt').forEach((btn,i)=>{
    btn.onclick=null;btn.classList.remove('sel');
    if(i===q.ans){btn.classList.add('ok');btn.querySelector('.opt-c').textContent='✓';}
    else if(i===selected&&!isCorrect){btn.classList.add('ng');btn.querySelector('.opt-c').textContent='✗';}
  });
  const bsp=document.getElementById('bsp');
  if(bsp){bsp.textContent=q.opts[q.ans];bsp.style.borderBottomColor=isCorrect?'#1E6B41':'#B03030';bsp.style.color=isCorrect?'#1E6B41':'#B03030';}

  // Update letter gap with result color
  if(q.letter){
    const mc=document.getElementById('main-content');
    const lb=mc.querySelector('.letter-body');
    if(lb) lb.innerHTML=renderLetterAfterReveal(q.id,isCorrect);
  }

  results.push({id:q.id,part:q.part,correct:isCorrect});
  if(isCorrect){streak++;if(streak>bestStreak)bestStreak=streak;}else{streak=0;}

  const sd=document.getElementById('streak-d');
  sd.textContent=`🔥 ${streak}`;
  sd.style.background=streak>=3?'#FBF6E6':'#f3f4f6';
  sd.style.color=streak>=3?'#B8860B':'#7A7668';
  const cr=results.filter(r=>r.correct).length,wr=results.filter(r=>!r.correct).length;
  document.getElementById('sc-ok').textContent=`✓ ${cr}`;
  document.getElementById('sc-ng').textContent=`✗ ${wr}`;

  const ex=document.getElementById('expl');
  ex.className='expl '+(isCorrect?'ok':'ng');
  ex.innerHTML=`<div class="expl-hd">${isCorrect?'✓ 正解！':'✗ 不正解。正解: '+q.opts[q.ans]}</div>${q.expl}`;
  ex.style.display='block';

  const isLast=idx+1>=questions.length;
  document.getElementById('act-row').innerHTML=
    `<button class="next-btn" onclick="nextQ()">${isLast?'結果を見る →':'次の問題 →'}</button>`;
}

function renderLetterAfterReveal(currentId,isCorrect){
  let html='';
  LETTER.forEach(seg=>{
    if(typeof seg==='string'){
      html+=seg.replace(/\n/g,'<br>');
    } else {
      const qId=seg.id;
      const q=QB.find(x=>x.id===qId);
      if(!q) return;
      const isCurrent=qId===currentId;
      const hasAnswer=letterAnswers.hasOwnProperty(qId);
      let cls='letter-gap';
      let text=q.opts[q.ans];
      if(isCurrent){
        cls+=isCorrect?' answered-ok':' answered-ng';
        text=q.opts[q.ans];
      } else if(hasAnswer){
        const ans=letterAnswers[qId];
        const r=results.find(x=>x.id===qId);
        cls+= r?(r.correct?' answered-ok':' answered-ng'):' done';
        text=q.opts[ans];
      }
      html+=`<span class="${cls}" id="gap-${qId}">${text}</span>`;
    }
  });
  return html;
}

function nextQ(){
  if(idx+1>=questions.length){showReview();return;}
  idx++;renderQ();
}

// ══════════════════════════════════════════════
// REVIEW
// ══════════════════════════════════════════════
function showReview(){
  show('review');
  const total=results.length,correct=results.filter(r=>r.correct).length;
  const pct=total?Math.round(correct/total*100):0;
  document.getElementById('rv-e').textContent=pct>=80?'🎉':pct>=60?'📚':'💪';
  document.getElementById('rv-p').textContent=pct+'%';
  document.getElementById('rv-p').style.color=pct>=80?'#1E6B41':pct>=60?'#B8860B':'#B03030';
  document.getElementById('rv-m').innerHTML=`${correct} / ${total} 問正解 &nbsp;|&nbsp; 🔥 最大連続正解: ${bestStreak}`;

  const bp=document.getElementById('by-part');
  bp.innerHTML='<div class="bpt-title">📊 パート別成績</div>';
  [{p:1,l:'Part 1'},{p:2,l:'Part 2'},{p:3,l:'Part 3'}].forEach(({p,l})=>{
    const pr=results.filter(r=>r.part===p);
    if(!pr.length)return;
    const pc2=Math.round(pr.filter(r=>r.correct).length/pr.length*100);
    const col=PART_CFG[p];
    bp.innerHTML+=`<div class="bpt-row">
      <span class="bpt-label" style="color:${col.color}">${l}</span>
      <div class="bpt-bar"><div class="bpt-fill" style="width:${pc2}%;background:${col.bar}"></div></div>
      <span class="bpt-pct" style="color:${col.color}">${pc2}%</span>
    </div>`;
  });

  const wrongIds=results.filter(r=>!r.correct).map(r=>r.id);
  const wl=document.getElementById('wlist'),wt=document.getElementById('wrongs-title');
  wl.innerHTML='';
  if(!wrongIds.length){wt.textContent='🏆 全問正解！素晴らしい！';return;}
  wt.textContent=`❌ 要復習 (${wrongIds.length}問)`;
  wrongIds.forEach(id=>{
    const q=QB.find(x=>x.id===id);if(!q)return;
    const col=PART_CFG[q.part];
    const d=document.createElement('div');d.className='wc';
    d.innerHTML=`<div class="wc-n" style="color:${col.color}">Q${q.id}</div>`+
      `<div class="wc-q">${q.q}</div>`+
      `<div class="wc-a">正解: ${q.opts[q.ans]}</div>`;
    wl.appendChild(d);
  });
}
</script>
